version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: hackeval_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: hackeval_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      # By default, PyTorch/Transformers can download models. 
      # We map a volume so models aren't downloaded every time the container restarts.
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - redis
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: hackeval_celery
    # Running Celery with solo pool is generally safer inside containers for Docling/Torch
    command: celery -A app.celery_app worker --loglevel=info -Q extraction,embedding -P solo
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - HF_HOME=/root/.cache/huggingface
      # Prevent deadlocks with HuggingFace tokenizers in Celery
      - TOKENIZERS_PARALLELISM=false 
      - OMP_NUM_THREADS=1
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
  hf_cache:
